AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB storage for DuoTech users, progress and ranking.

Parameters:
  TableName:
    Type: String
    Default: duotech-app-state

Resources:
  DuoTechAppStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH

Outputs:
  TableName:
    Value: !Ref DuoTechAppStateTable
